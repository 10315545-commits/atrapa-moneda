<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atrapa la Moneda Pro 🪙</title>
    <style>
        body {
            background-color: #020617;
            color: #f8fafc;
            font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            user-select: none;
        }
        .game-container {
            text-align: center;
            position: relative;
        }
        .hud {
            display: flex;
            justify-content: space-between;
            width: 440px;
            margin-bottom: 10px;
            font-size: 22px;
            font-weight: 800;
            text-transform: uppercase;
        }
        .score { color: #fbbf24; text-shadow: 0 0 10px rgba(251, 191, 36, 0.5); }
        .lives { color: #ef4444; text-shadow: 0 0 10px rgba(239, 68, 68, 0.5); }
        canvas {
            background: radial-gradient(circle at center, #1e1b4b 0%, #05020a 100%);
            border: 4px solid #38bdf8;
            border-radius: 16px;
            box-shadow: 0 0 30px rgba(56, 189, 248, 0.2);
            cursor: none;
        }
        .controls { margin-top: 10px; color: #64748b; font-size: 14px; }
        
        /* CONSOLA ADMIN MINI */
        #admin-panel {
            display: none;
            position: absolute;
            top: 60px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(9, 13, 22, 0.95);
            border: 2px solid #22c55e;
            padding: 12px;
            border-radius: 8px;
            width: 280px;
            z-index: 10;
            box-shadow: 0 0 20px rgba(34, 197, 94, 0.3);
        }
        #admin-input {
            width: 90%;
            background: #000;
            border: 1px solid #22c55e;
            color: #22c55e;
            padding: 6px;
            font-family: monospace;
            border-radius: 4px;
            outline: none;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="game-container">
        <div class="hud">
            <div class="score">Oro: <span id="score">0</span></div>
            <div class="lives">Vidas: <span id="lives">❤️❤️❤️</span></div>
        </div>
        
        <canvas id="gameCanvas" width="440" height="540"></canvas>
        
        <!-- PANEL DE ADMIN OCULTO -->
        <div id="admin-panel">
            <div style="color: #22c55e; font-size: 12px; margin-bottom: 6px; font-weight: bold;">CONSOLA CORE ADMIN</div>
            <input type="text" id="admin-input" placeholder="Escribe comando..." autocomplete="off">
        </div>

        <div class="controls">
            Mueve el mouse lateralmente | Presiona la tecla <strong>Punto (.)</strong> para Admin
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const livesEl = document.getElementById('lives');
        const adminPanel = document.getElementById('admin-panel');
        const adminInput = document.getElementById('admin-input');

        let score = 0;
        let lives = 3;
        let particles = [];
        let gameActive = true;
        let godMode = false;

        // Variables de tus comandos especiales
        let partyMode = false;
        let bloodMoonMode = false;
        let adminEventActive = false;
        let partyColorTimer = 0;
        let adminMessage = "";
        let adminMessageTimer = 0;
        let trollfaceInterval = null;

        const player = { x: 175, y: 480, width: 90, height: 24 };
        const coin = { x: 220, y: -30, radius: 14, speed: 4, angle: 0 };

        // Audio Sintetizado para el comando party
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        function playTrollfaceTone() {
            if (!partyMode) return;
            const notes = [293.66, 329.63, 349.23, 392.00, 440.00, 523.25];
            const note = notes[Math.floor(Math.random() * notes.length)];
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(note, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.04, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.15);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.15);
        }

        function createExplosion(x, y, customColor) {
            const color = customColor || '#fef08a';
            for (let i = 0; i < 12; i++) {
                particles.push({
                    x: x, y: y,
                    vx: (Math.random() - 0.5) * 5, vy: (Math.random() - 0.7) * 4,
                    radius: Math.random() * 3 + 1, alpha: 1,
                    color: color
                });
            }
        }

        function updateParticles() {
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.x += p.vx; p.y += p.vy; p.vy += 0.12; p.alpha -= 0.02;
                if (p.alpha <= 0) { particles.splice(i, 1); continue; }
                ctx.save();
                ctx.globalAlpha = p.alpha;
                ctx.fillStyle = p.color;
                ctx.beginPath(); ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2); ctx.fill();
                ctx.restore();
            }
        }

        canvas.addEventListener('mousemove', (e) => {
            if (!gameActive) return;
            const rect = canvas.getBoundingClientRect();
            player.x = (e.clientX - rect.left) - player.width / 2;
            if (player.x < 0) player.x = 0;
            if (player.x > canvas.width - player.width) player.x = canvas.width - player.width;
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === '.') {
                e.preventDefault();
                if (adminPanel.style.display === 'block') {
                    adminPanel.style.display = 'none';
                    gameActive = true;
                } else {
                    adminPanel.style.display = 'block';
                    adminInput.focus();
                    gameActive = false;
                }
            }
        });

        adminInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                if (audioCtx.state === 'suspended') audioCtx.resume();
                const args = adminInput.value.trim().split(" ");
                const command = adminInput.value.trim().toLowerCase();

                if (command === "god") {
                    godMode = !godMode;
                    player.width = godMode ? 150 : 90;
                }
                if (args[ str = 0].toLowerCase() === "score" && args[1]) {
                    score = parseInt(args[1]) || 0;
                    scoreEl.textContent = score;
                }
                if (command === "heal") {
                    lives = 3;
                    livesEl.textContent = '❤️❤️❤️';
                }
                if (command === "slow") {
                    coin.speed = 1.5;
                }
                if (args[0].toLowerCase() === "size" && args[1]) {
                    player.width = parseInt(args[1]) || 90;
                }

                // COMANDO PARTY
                if (command === "party") {
                    partyMode = !partyMode;
                    bloodMoonMode = false;
                    if (partyMode) {
                        trollfaceInterval = setInterval(playTrollfaceTone, 180);
                    } else {
                        clearInterval(trollfaceInterval);
                    }
                }

                // COMANDO BLOOD MOON
                if (command === "blood moon") {
                    bloodMoonMode = !bloodMoonMode;
                    partyMode = false;
                    clearInterval(trollfaceInterval);
                }

                // COMANDO ADMIN EVENT
                if (command === "admin event") {
                    adminEventActive = !adminEventActive;
                    if (adminEventActive) {
                        adminMessage = "[SISTEMA]: Enlace Admin Establecido.";
                        adminMessageTimer = 140;
                    }
                }

                adminInput.value = "";
                adminPanel.style.display = 'none';
                gameActive = true;
            }
        });

        function resetCoin() {
            coin.x = Math.random() * (canvas.width - 40) + 20;
            coin.y = -30;
            coin.speed = bloodMoonMode ? 7.5 : 4 + (score * 0.2);
        }

        function resetGame() {
            score = 0; lives = 3; godMode = false; player.width = 90; particles = [];
            partyMode = false; bloodMoonMode = false; adminEventActive = false;
            clearInterval(trollfaceInterval);
            scoreEl.textContent = score;
            livesEl.textContent = '❤️❤️❤️';
            resetCoin();
        }

        function update() {
            if (gameActive) {
                coin.y += coin.speed;
                coin.angle += 0.05;

                // Rastreadores de sangre constantes
                if (bloodMoonMode && Math.random() > 0.3) {
                    particles.push({
                        x: coin.x, y: coin.y,
                        vx: (Math.random() - 0.5) * 1.5, vy: Math.random() * 1.5,
                        radius: Math.random() * 2 + 1, alpha: 0.8,
                        color: '#ef4444'
                    });
                }

(coin.x, coin.y); ctx.scale(Math.abs(Math.sin(coin.angle)), 1);let cGrad = ctx.createRadialGradient(-3, -3, 2, 0, 0, coin.radius);if (bloodMoonMode) {cGrad.addColorStop(0, '#fee2e2'); cGrad.addColorStop(0.5, '#ef4444'); cGrad.addColorStop(1, '#991b1b');ctx.shadowColor = '#ef4444';} else {cGrad.addColorStop(0, '#fffbeb'); cGrad.addColorStop(0.3, '#fef08a'); cGrad.addColorStop(0.7, '#eab308'); cGrad.addColorStop(1, '#854d0e');ctx.shadowColor = '#eab308';}ctx.shadowBlur = 20;ctx.fillStyle = cGrad; ctx.beginPath(); ctx.arc(0, 0, coin.radius, 0, Math.PI * 2); ctx.fill();ctx.strokeStyle = bloodMoonMode ? '#fca5a5' : '#fef08a'; ctx.lineWidth = 1.5; ctx.beginPath(); ctx.arc(0, 0, coin.radius - 4, 0, Math.PI * 2); ctx.stroke();ctx.restore();// Render del cuadro de texto para Admin Eventif (adminMessageTimer > 0) {adminMessageTimer--;ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';ctx.fillRect(20, 20, canvas.width - 40, 36);ctx.strokeStyle = '#22c55e'; ctx.lineWidth = 1.5;ctx.strokeRect(20, 20, canvas.width - 40, 36);ctx.fillStyle = '#22c55e'; ctx.font = 'bold 13px monospace'; ctx.textAlign = 'center';ctx.fillText(adminMessage, canvas.width / 2, 42);}requestAnimationFrame(update);}resetCoin();update();
