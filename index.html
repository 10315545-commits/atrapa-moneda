<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Atrapa la Moneda Lite</title>

<style>
body{
  margin:0;
  background:#0f172a;
  color:white;
  font-family:Arial;
  text-align:center;
}

h1{
  color:#00ffcc;
}

#moneda{
  font-size:70px;
  margin:20px;
}

.info{
  font-size:18px;
  margin:10px;
}

/* CHAT */
#chat{
  position:fixed;
  bottom:10px;
  right:10px;
  width:240px;
  background:#111;
  border:1px solid #00ffcc;
  border-radius:8px;
  padding:5px;
}

#messages{
  height:120px;
  overflow-y:auto;
  font-size:13px;
  margin-bottom:5px;
}

#input{
  width:100%;
  padding:5px;
  border:none;
  border-radius:5px;
  outline:none;
}
</style>
</head>

<body>

<h1>🎮 ATRAPA LA MONEDA</h1>

<h2 id="moneda">?</h2>
<p>Presiona L, C o R</p>
<div class="info" id="stats"></div>

<!-- CHAT -->
<div id="chat">
  <div id="messages"></div>
  <input id="input" placeholder="Escribe..." />
</div>

<script>
// ===== JUEGO =====
let monedas = 0;
let vidas = 5;
let record = parseInt(localStorage.getItem("record")) || 0;

const opciones = ["L","C","R"];
let actual = "";

const monedaEl = document.getElementById("moneda");
const statsEl = document.getElementById("stats");

function nuevaMoneda(){
  actual = opciones[Math.floor(Math.random()*3)];
  monedaEl.textContent = actual;
}

function actualizar(){
  statsEl.textContent =
    "Monedas: " + monedas +
    " | Vidas: " + vidas +
    " | Record: " + record;
}

function gameOver(){
  if(monedas > record){
    record = monedas;
    localStorage.setItem("record", record);
  }
  alert("GAME OVER");
  monedas = 0;
  vidas = 5;
  nuevaMoneda();
  actualizar();
}

document.addEventListener("keydown", function(e){
  const key = e.key.toUpperCase();

  if(!opciones.includes(key)) return;

  if(key === actual){
    monedas++;
  } else {
    vidas--;
  }

  if(vidas <= 0){
    gameOver();
  } else {
    nuevaMoneda();
    actualizar();
  }
});

// iniciar
nuevaMoneda();
actualizar();

// ===== CHAT =====
const input = document.getElementById("input");
const messages = document.getElementById("messages");

input.addEventListener("keydown", function(e){
  if(e.key === "Enter"){
    const texto = input.value.trim();
    if(texto === "") return;

    const msg = document.createElement("div");
    msg.textContent = "Jugador: " + texto;

    messages.appendChild(msg);

    // Limitar mensajes (evita lag)
    if(messages.children.length > 15){
      messages.removeChild(messages.firstChild);
    }

    messages.scrollTop = messages.scrollHeight;
    input.value = "";
  }
});
</script>

</body>
</html>
