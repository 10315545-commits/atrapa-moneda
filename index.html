<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Atrapa la Moneda con Flechas</title>
</head>
<body style="text-align:center; font-family:Arial;">

<h1>Atrapa la Moneda 🪙</h1>
<p>Presiona cualquier flecha (↑ ↓ ← →) para atraparla</p>
<p id="estado">Esperando...</p>

<script>
let cayendo = false;
let tiempoInicio;

function soltarMoneda() {
    document.getElementById("estado").innerText = "¡Cayó la moneda!";
    cayendo = true;
    tiempoInicio = Date.now();
}

// tiempo aleatorio
setTimeout(soltarMoneda, Math.random() * 3000 + 2000);

document.addEventListener("keydown", function(event) {
    const flechas = ["ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight"];

    if (flechas.includes(event.code)) {
        if (cayendo) {
            let tiempoReaccion = Date.now() - tiempoInicio;

            if (tiempoReaccion < 300) {
                document.getElementById("estado").innerText = "¡La atrapaste! 😎";
            } else {
                document.getElementById("estado").innerText = "Muy lento 😅";
            }

            cayendo = false;
        } else {
            document.getElementById("estado").innerText = "Te adelantaste 😂";
        }
    }
});
</script>

</body>
</html>
