<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Atrapa la Moneda PRO</title>

<style>
body{
  margin:0;
  background:#0f0f0f;
  color:white;
  font-family:Arial;
  text-align:center;
}

h1{color:#00ffcc;}
#moneda{font-size:80px;margin:20px;}
.info{font-size:20px;margin:10px;}

input,button{
  margin:5px;
  padding:6px;
  border:none;
  border-radius:6px;
}

/* LOGIN */
#loginBox{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:#111;
  padding:20px;
  border-radius:10px;
  border:2px solid #00ffcc;
}

/* PANEL */
#panelBtn{
  position:fixed;
  top:10px;
  right:10px;
  background:#ff00ff;
  display:none;
}

#panel{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:#111;
  padding:20px;
  border-radius:10px;
  display:none;
}

/* CHAT */
#chat{
  position:fixed;
  bottom:10px;
  right:10px;
  width:240px;
  background:#111;
  border:1px solid #00ffcc;
  border-radius:8px;
  padding:5px;
}

#messages{
  height:120px;
  overflow-y:auto;
  font-size:13px;
}
</style>
</head>

<body>

<h1>🎮 ATRAPA LA MONEDA PRO</h1>

<div id="loginBox">
  <h3>Login</h3>
  <input id="user" placeholder="usuario"><br>
  <input id="pass" type="password" placeholder="contraseña"><br>
  <button onclick="login()">Entrar</button>
</div>

<button id="panelBtn" onclick="togglePanel()">PANEL</button>

<div id="panel">
  <h3>Panel</h3>
  <div id="panelContent"></div>
  <button onclick="togglePanel()">Cerrar</button>
</div>

<h2 id="moneda">?</h2>
<p>Presiona L, C o R</p>
<div class="info" id="stats"></div>

<div id="chat">
  <div id="messages"></div>
  <input id="input" placeholder="Escribe..." />
</div>

<script>

// ===== USUARIOS =====
const users = {
  owner:{pass:"1234",role:"owner"},
  admin:{pass:"1234",role:"admin"},
  tester:{pass:"1234",role:"tester"},
  player:{pass:"1234",role:"player"}
};

let role="player";

// ===== LOGIN =====
function login(){
  const u=user.value;
  const p=pass.value;

  if(users[u] && users[u].pass===p){
    role=users[u].role;
    loginBox.style.display="none";
    panelBtn.style.display="block";
    addMsg("[SYS] Logeado como "+role);
    buildPanel();
  }else{
    alert("Error");
  }
}

// ===== PANEL =====
function togglePanel(){
  panel.style.display = panel.style.display==="block" ? "none" : "block";
}

function buildPanel(){
  panelContent.innerHTML="";

  if(role==="owner"){
    addBtn("Vida infinita", ()=>{vidas=9999;update();});
    addBtn("+20 monedas", ()=>{pesos+=20;update();});
  }

  if(role==="admin" || role==="owner"){
    addBtn("+10 monedas", ()=>{pesos+=10;update();});
  }

  if(role==="tester"){
    addBtn("Test", ()=>{addMsg("[SYS] Test OK");});
  }
}

function addBtn(text,action){
  const b=document.createElement("button");
  b.textContent=text;
  b.onclick=action;
  panelContent.appendChild(b);
}

// ===== JUEGO =====
let pesos=0,vidas=5,record=parseInt(localStorage.getItem("record"))||0;
let secuencia=["R","L","C","L","R","C","R"];
let i=0,actual="",vel=1500,loop;

function nueva(){
  actual=secuencia[i];
  moneda.textContent=actual;
  i=(i+1)%secuencia.length;
}

function update(){
  stats.textContent=`Pesos:${pesos} | Vidas:${vidas} | Record:${record}`;
}

function over(){
  clearInterval(loop);
  if(pesos>record){
    record=pesos;
    localStorage.setItem("record",record);
  }
  alert("GAME OVER");
  start();
}

function tick(){
  vidas--;
  update();
  if(vidas<=0) return over();
  nueva();
}

function start(){
  pesos=0;vidas=5;vel=1500;i=0;
  update(); nueva();
  clearInterval(loop);
  loop=setInterval(tick,vel);
}

document.addEventListener("keydown",e=>{
  const k=e.key.toUpperCase();
  if(!["L","C","R"].includes(k)) return;

  if(k===actual){
    pesos++;
    vel=Math.max(500,vel-50);
    clearInterval(loop);
    loop=setInterval(tick,vel);
  }else{
    vidas--;
  }

  update();
  if(vidas<=0) return over();
  nueva();
});

start();

// ===== CHAT =====
input.addEventListener("keydown",e=>{
  if(e.key==="Enter"){
    if(!input.value.trim()) return;
    addMsg("Jugador: "+input.value);
    input.value="";
  }
});

function addMsg(t){
  const d=document.createElement("div");
  d.textContent=t;
  messages.appendChild(d);

  if(messages.children.length>20){
    messages.removeChild(messages.firstChild);
  }

  messages.scrollTop=messages.scrollHeight;
}

</script>

</body>
</html>
