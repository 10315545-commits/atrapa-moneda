<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atrapa la Moneda 🪙</title>
    <style>
        body {
            background-color: #020617;
            color: #f8fafc;
            font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            user-select: none;
        }
        .game-container {
            text-align: center;
        }
        .hud {
            display: flex;
            justify-content: space-between;
            width: 440px;
            margin-bottom: 10px;
            font-size: 22px;
            font-weight: 800;
            text-transform: uppercase;
        }
        .score { color: #fbbf24; text-shadow: 0 0 10px rgba(251, 191, 36, 0.5); }
        .lives { color: #ef4444; text-shadow: 0 0 10px rgba(239, 68, 68, 0.5); }
        canvas {
            background: radial-gradient(circle at center, #1e1b4b 0%, #05020a 100%);
            border: 4px solid #38bdf8;
            border-radius: 16px;
            box-shadow: 0 0 30px rgba(56, 189, 248, 0.2);
            cursor: none; /* Esconde el mouse para usar solo la barra */
        }
        .controls { margin-top: 10px; color: #64748b; font-size: 14px; }
    </style>
</head>
<body>

    <div class="game-container">
        <div class="hud">
            <div class="score">Oro: <span id="score">0</span></div>
            <div class="lives">Vidas: <span id="lives">❤️❤️❤️</span></div>
        </div>
        
        <canvas id="gameCanvas" width="440" height="540"></canvas>
        
        <div class="controls">
            Mueve el mouse de izquierda a derecha para jugar
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const livesEl = document.getElementById('lives');

        let score = 0;
        let lives = 3;
        let particles = [];

        const player = { x: 175, y: 480, width: 90, height: 24 };
        const coin = { x: 220, y: -30, radius: 14, speed: 4, angle: 0 };

        // Sistema de chispas brillantes
        function createExplosion(x, y) {
            for (let i = 0; i < 12; i++) {
                particles.push({
                    x: x, y: y,
                    vx: (Math.random() - 0.5) * 5, vy: (Math.random() - 0.7) * 4,
                    radius: Math.random() * 3 + 1, alpha: 1
                });
            }
        }

        function updateParticles() {
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.x += p.vx; p.y += p.vy; p.vy += 0.12; p.alpha -= 0.02;
                if (p.alpha <= 0) { particles.splice(i, 1); continue; }
                ctx.save();
                ctx.globalAlpha = p.alpha;
                ctx.fillStyle = '#fef08a';
                ctx.beginPath(); ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2); ctx.fill();
                ctx.restore();
            }
        }

        // Movimiento suave con el mouse
        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            player.x = (e.clientX - rect.left) - player.width / 2;
            if (player.x < 0) player.x = 0;
            if (player.x > canvas.width - player.width) player.x = canvas.width - player.width;
        });

        function resetCoin() {
            coin.x = Math.random() * (canvas.width - 40) + 20;
            coin.y = -30;
            coin.speed = 4 + (score * 0.2); // Aumenta la velocidad según tu puntaje
        }

        function resetGame() {
            score = 0; lives = 3; particles = [];
            scoreEl.textContent = score;
            livesEl.textContent = '❤️❤️❤️';
            resetCoin();
        }

        // Bucle principal del juego
        function update() {
            coin.y += coin.speed;
            coin.angle += 0.05; // Velocidad de giro de la moneda

            // Colisión con la barra de neón
            if (coin.y + coin.radius >= player.y && coin.x >= player.x && coin.x <= player.x + player.width && coin.y - coin.radius <= player.y + player.height) {
                createExplosion(coin.x, coin.y);
                score++;
                scoreEl.textContent = score;
                resetCoin();
            }

            // Moneda toca el suelo
            if (coin.y - coin.radius > canvas.height) {
                lives--;
                livesEl.textContent = '❤️'.repeat(lives) + '🖤'.repeat(3 - lives);
                if (lives <= 0) {
                    alert(`¡Juego Terminado! Conseguiste ${score} monedas.`);
                    resetGame();
                } else {
                    resetCoin();
                }
            }

            // --- RENDERIZADO GRÁFICO (DIBUJO) ---
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            updateParticles();

            // Dibujar la barra de neón azul
            ctx.save();
            let pGrad = ctx.createLinearGradient(player.x, player.y, player.x, player.y + player.height);
            pGrad.addColorStop(0, '#38bdf8'); pGrad.addColorStop(1, '#1e40af');
            ctx.shadowColor = '#0ea5e9'; ctx.shadowBlur = 15;
            ctx.fillStyle = pGrad; ctx.beginPath(); ctx.roundRect(player.x, player.y, player.width, player.height, 6); ctx.fill();
            ctx.restore();

            // Dibujar la moneda brillante girando en 3D
            ctx.save();
            ctx.translate(coin.x, coin.y); ctx.scale(Math.abs(Math.sin(coin.angle)), 1);
            let cGrad = ctx.createRadialGradient(-3, -3, 2, 0, 0, coin.radius);
            cGrad.addColorStop(0, '#fffbeb'); cGrad.addColorStop(0.3, '#fef08a'); cGrad.addColorStop(0.7, '#eab308'); cGrad.addColorStop(1, '#854d0e');
            ctx.shadowColor = '#eab308'; ctx.shadowBlur = 20;
            ctx.fillStyle = cGrad; ctx.beginPath(); ctx.arc(0, 0, coin.radius, 0, Math.PI * 2); ctx.fill();
            ctx.strokeStyle = '#fef08a'; ctx.lineWidth = 1.5; ctx.beginPath(); ctx.arc(0, 0, coin.radius - 4, 0, Math.PI * 2); ctx.stroke();
            ctx.restore();

            requestAnimationFrame(update);
        }

        // Iniciar el juego automáticamente al cargar
        resetCoin();
        update();
    </script>
</body>
</html>
