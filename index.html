<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Atrapa la Moneda</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow:hidden;
    background:linear-gradient(#4ec0ff,#87ceeb);
    font-family:Arial, sans-serif;
}

#contador{
    position:fixed;
    top:15px;
    left:15px;
    background:white;
    padding:10px 20px;
    border-radius:10px;
    font-size:22px;
    font-weight:bold;
    z-index:1000;
}

.moneda{
    position:absolute;
    top:-60px;
    font-size:40px;
    cursor:pointer;
    user-select:none;
    animation:caer linear forwards;
}

@keyframes caer{
    from{
        transform:translateY(0) rotate(0deg);
    }
    to{
        transform:translateY(110vh) rotate(720deg);
    }
}
</style>

</head>
<body>

<div id="contador">🪙 Monedas: <span id="coins">0</span></div>

<script>

let monedas = 0;

function crearMoneda(){

    const coin = document.createElement("div");

    coin.className = "moneda";
    coin.textContent = "🪙";

    coin.style.left = Math.random()*window.innerWidth+"px";
    coin.style.animationDuration = (2+Math.random()*3)+"s";

    coin.onclick = function(){

        monedas++;
        document.getElementById("coins").textContent = monedas;

        coin.remove();

    };

    coin.addEventListener("animationend",()=>{
        coin.remove();
    });

    document.body.appendChild(coin);

}

// Crear una moneda cada 250 ms
setInterval(crearMoneda,250);

</script>

</body>
</html>
