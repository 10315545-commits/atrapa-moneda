<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Atrapa la Moneda - Lite</title>

<style>
body{
  margin:0;
  background:#0f172a;
  color:white;
  font-family:Arial;
  text-align:center;
}

h1{
  color:#00ffcc;
}

#moneda{
  font-size:70px;
  margin:20px;
}

.info{
  margin:10px;
  font-size:18px;
}

/* CHAT */
#chat{
  position:fixed;
  bottom:10px;
  right:10px;
  width:230px;
  background:#111;
  border:1px solid #00ffcc;
  border-radius:8px;
  padding:5px;
}

#messages{
  height:120px;
  overflow-y:auto;
  font-size:13px;
  margin-bottom:5px;
}

#input{
  width:100%;
  padding:4px;
  border:none;
  border-radius:5px;
}
</style>
</head>

<body>

<h1>🎮 ATRAPA LA MONEDA</h1>

<h2 id="moneda">?</h2>
<p>Presiona L, C o R</p>
<div class="info" id="stats"></div>

<!-- CHAT -->
<div id="chat">
  <div id="messages"></div>
  <input id="input" placeholder="Escribe..." />
</div>

<script>

/* -------- JUEGO -------- */
let monedas = 0;
let vidas = 5;
let record = parseInt(localStorage.getItem("record")) || 0;

const opciones = ["L","C","R"];
let actual = "";

const monedaEl = document.getElementById("moneda");
const stats = document.getElementById("stats");

function nueva(){
  actual = opciones[Math.floor(Math.random()*3)];
  monedaEl.textContent = actual;
}

function update(){
  stats.textContent = `Monedas: ${monedas} | Vidas: ${vidas} | Record: ${record}`;
}

function gameOver(){
  if(monedas > record){
    record = monedas;
    localStorage.setItem("record", record);
  }
  alert("GAME OVER");
  monedas = 0;
  vidas = 5;
  nueva();
  update();
}

document.addEventListener("keydown", e=>{
  const key = e.key.toUpperCase();
  if(!opciones.includes(key)) return;

  if(key === actual){
    monedas++;
  }else{
    vidas--;
  }

  if(vidas <= 0){
    gameOver();
  }

  nueva();
  update();
});

nueva();
update();

/* -------- CHAT -------- */
const input = document.getElementById("input");
const messages = document.getElementById("messages");

input.addEventListener("keydown", e=>{
  if(e.key === "Enter"){
    if(!input.value.trim()) return;

    const div = document.createElement("div");
    div.textContent = "Jugador: " + input.value;

    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;

    // Limitar mensajes (optimización)
    if(messages.children.length > 15){
      messages.removeChild(messages.firstChild);
    }

    input.value = "";
  }
});

</script>

</body>
</html>
