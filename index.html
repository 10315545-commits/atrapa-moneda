<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coin Catcher🪙</title>
    <style>
        body {
            background-color: #020617;
            color: #f8fafc;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            user-select: none;
        }
        .game-container {
            text-align: center;
            position: relative;
        }
        .hud {
            display: flex;
            justify-content: space-between;
            width: 440px;
            margin-bottom: 15px;
            font-size: 22px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .score {
            color: #fbbf24;
            text-shadow: 0 0 10px rgba(251, 191, 36, 0.5);
        }
        .lives {
            color: #ef4444;
            text-shadow: 0 0 10px rgba(239, 68, 68, 0.5);
        }
        canvas {
            background: radial-gradient(circle at center, #1e1b4b 0%, #090514 100%);
            border: 4px solid #38bdf8;
            border-radius: 16px;
            box-shadow: 0 0 30px rgba(56, 189, 248, 0.2), inset 0 0 20px rgba(0, 0, 0, 0.6);
            cursor: none;
        }
        .controls {
            margin-top: 15px;
            color: #64748b;
            font-size: 14px;
            font-weight: 500;
        }
        #admin-console {
            display: none;
            position: absolute;
            top: 25%;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(2, 6, 23, 0.95);
            border: 2px solid #22c55e;
            padding: 20px;
            border-radius: 12px;
            width: 320px;
            box-shadow: 0 0 30px rgba(34, 197, 94, 0.4);
            z-index: 10;
        }
        #admin-console h3 {
            margin: 0 0 12px 0;
            color: #22c55e;
            font-size: 18px;
            letter-spacing: 2px;
        }
        #admin-input {
            width: 93%;
            background: #000;
            border: 1px solid #22c55e;
            color: #3ade75;
            padding: 10px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            border-radius: 6px;
            outline: none;
        }
    </style>
</head>
<body>

    <div class="game-container">
        <div class="hud">
            <div class="score">Oro: <span id="score">0</span></div>
            <div class="lives">Vidas: <span id="lives">❤️❤️❤️</span></div>
        </div>
        <canvas id="gameCanvas" width="440" height="540"></canvas>
        <div class="controls">
            Flechas Izquierda / Derecha o Mouse | Presiona la tecla N para comandos de Admin
        </div>
        <div id="admin-console">
            <h3>SISTEMA CORE ADMIN</h3>
            <input type="text" id="admin-input" placeholder="Ingresa comando..." autocomplete="off">
        </div>
    </div>

    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSound(type) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            if (type === 'coin') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(587.33, audioCtx.currentTime); 
                osc.frequency.setValueAtTime(880, audioCtx.currentTime + 0.08); 
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.3);
            } else if (type === 'hurt') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(150, audioCtx.currentTime);
                osc.frequency.linearRampToValueAtTime(40, audioCtx.currentTime + 0.2);
                gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.25);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.25);
            } else if (type === 'gameover') {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(300, audioCtx.currentTime);
                osc.frequency.linearRampToValueAtTime(100, audioCtx.currentTime + 0.6);
                gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.6);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.6);
            }
        }

        const ADMIN_PASSWORD = "admin"; 
        let isAdmin = false;
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const livesEl = document.getElementById('lives');
        const consoleEl = document.getElementById('admin-console');
        const inputEl = document.getElementById('admin-input');

        let score = 0;
        let lives = 3;
        let gameActive = true;
        let godMode = false;
        let particles = []; 

        const player = { x: 180, y: 480, width: 90, height: 24, speed: 9 };
        const coin = { x: 220, y: -30, radius: 14, speed: 4.5, angle: 0 };
        const keys = { Left: false, Right: false };

        function createExplosion(x, y) {
            for (let i = 0; i < 15; i++) {
                particles.push({
                    x: x, y: y,
                    vx: (Math.random() - 0.5) * 6, 
                    vy: (Math.random() - 0.7) * 5, 
                    radius: Math.random() * 3 + 1,
                    alpha: 1,
                    color: Math.random() > 0.5 ? '#fef08a' : '#eab308' 
                });
            }
        }

        function updateParticles() {
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.x += p.vx; p.y += p.vy; p.vy += 0.15; p.alpha -= 0.02; 
                if (p.alpha <= 0) { particles.splice(i, 1); continue; }
                ctx.save();
                ctx.globalAlpha = p.alpha;
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        function executeCommand(input) {
            const args = input.trim().split(" ");
            const command = args[0].toLowerCase();
            switch(command) {
                case "score":
                    let val = parseInt(args[1]);
                    if (!isNaN(val)) { score = val; scoreEl.textContent = score; }
                    break;
                case "god":
                    godMode = !godMode;
                    player.width = godMode ? 140 : 90;
                    break;
                case "speed":
                    let s = parseFloat(args[1]);
                    if (!isNaN(s)) player.speed = s;
                    break;
                case "heal":
                    lives = 3;
                    livesEl.textContent = '❤️❤️❤️';
                    break;
                case "slow":
                    coin.speed = 1.5;
                    break;
            }
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'n' || e.key === 'N') {
                if (consoleEl.style.display === 'block') {
                    consoleEl.style.display = 'none';
                    gameActive = true;
                    update();
                } else {
                    if (!isAdmin) {
                        let p = prompt("Clave de acceso de Administrador:");
                        if (p === ADMIN_PASSWORD) isAdmin = true;
                        else return;
                    }
                    consoleEl.style.display = 'block';
                    inputEl.focus();
                    gameActive = false;
                }
                return;
            }
            if (consoleEl.style.display === 'block') return;
            if (e.key === 'ArrowLeft') keys.Left = true;
            if (e.key === 'ArrowRight') keys.Right = true;
        });

        document.addEventListener('keyup', (e) => {
            if (e.key === 'ArrowLeft') keys.Left = false;
            if (e.key === 'ArrowRight') keys.Right = false;
        });

        canvas.addEventListener('mousemove', (e) => {
            if (consoleEl.style.display === 'block') return;
            const rect = canvas.getBoundingClientRect();
            player.x = (e.clientX - rect.left) - player.width / 2;
            if (player.x < 0) player.x = 0;
            if (player.x > canvas.width - player.width) player.x = canvas.width - player.width;
        });

        inputEl.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                executeCommand(inputEl.value);
                inputEl.value = "";
                consoleEl.style.display = 'none';
                gameActive = true;
                update();
            }
        });

        function resetCoin() {
            coin.x = Math.random() * (canvas.width - 40) + 20;
            coin.y = -30;
            coin.speed = 4.5 + (score * 0.15);
        }

        function resetGame() {
            score = 0; lives = 3; godMode = false; player.width = 90; particles = [];
            scoreEl.textContent = score;
            livesEl.textContent = '❤️❤️❤️';
            resetCoin();
Usa el código con precaución.gameActive = true;update();}function update() {if (!gameActive) return;if (keys.Left && player.x > 0) player.x -= player.speed;if (keys.Right && player.x < canvas.width - player.width) player.x += player.speed;coin.y += coin.speed;coin.angle += 0.05;if (coin.y + coin.radius >= player.y && coin.x >= player.x && coin.x <= player.x + player.width && coin.y - coin.radius <= player.y + player.height) {playSound('coin');createExplosion(coin.x, coin.y);score += 1;scoreEl.textContent = score;resetCoin();}if (coin.y - coin.radius > canvas.height) {if (!godMode) {lives -= 1;playSound('hurt');livesEl.textContent = '❤️'.repeat(lives) + '🖤'.repeat(3 - lives);}if (lives <= 0) {gameActive = false;playSound('gameover');setTimeout(() => {alert(FIN DE LA SIMULACIÓN\nMonedas totales: ${score});resetGame();}, 50);return;}resetCoin();}ctx.clearRect(0, 0, canvas.width, canvas.height);updateParticles();ctx.save();let platformGrad = ctx.createLinearGradient(player.x, player.y, player.x, player.y + player.height);platformGrad.addColorStop(0, godMode ? '#4ade80' : '#38bdf8');platformGrad.addColorStop(1, godMode ? '#166534' : '#1e40af');ctx.shadowColor = godMode ? '#22c55e' : '#0ea5e9';ctx.shadowBlur = 15;ctx.fillStyle = platformGrad;ctx.beginPath();ctx.roundRect(player.x, player.y, player.width, player.height, 6);ctx.fill();ctx.restore();ctx.save();ctx.translate(coin.x, coin.y);ctx.scale(Math.abs(Math.sin(coin.angle)), 1);let coinGrad = ctx.createRadialGradient(-3, -3, 2, 0, 0, coin.radius);coinGrad.addColorStop(0, '#fffbeb');coinGrad.addColorStop(0.3, '#fef08a');coinGrad.addColorStop(0.7, '#eab308');coinGrad.addColorStop(1, '#854d0e');ctx.shadowColor = '#eab308';ctx.shadowBlur = 20;ctx.fillStyle = coinGrad;ctx.beginPath();ctx.arc(0, 0, coin.radius, 0, Math.PI * 2);ctx.fill();ctx.strokeStyle = '#fef08a';ctx.lineWidth = 1.5;ctx.beginPath();ctx.arc(0, 0, coin.radius - 4, 0, Math.PI * 2);ctx.stroke();ctx.restore();requestAnimationFrame(update);}update();
