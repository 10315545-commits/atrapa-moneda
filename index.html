<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atrapa la Moneda</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #202020;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Courier New', Courier, monospace;
        }
        canvas {
            background: linear-gradient(to bottom, #87CEEB, #E0F6FF);
            border: 4px solid #fff;
            border-radius: 10px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

<canvas id="gameCanvas" width="400" height="600"></canvas>

<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");

    // Variables del juego
    let score = 0;
    let timeLeft = 30; // 30 segundos de juego
    let gameInterval;
    let timerInterval;
    let isPlaying = false;

    // La Cesta (Jugador)
    const basket = {
        x: 160,
        y: 540,
        width: 80,
        height: 20,
        color: "#8B4513"
    };

    // La Moneda
    const coin = {
        x: 0,
        y: -30,
        radius: 15,
        speed: 4,
        color: "#FFD700"
    };

    // Reiniciar la moneda arriba en una posición aleatoria
    function resetCoin() {
        coin.y = -30;
        coin.x = Math.random() * (canvas.width - coin.radius * 2) + coin.radius;
    }

    // Dibujar la cesta
    function drawBasket() {
        ctx.fillStyle = basket.color;
        ctx.fillRect(basket.x, basket.y, basket.width, basket.height);
        
        // Detalles de la cesta
        ctx.strokeStyle = "#5c2d0c";
        ctx.lineWidth = 3;
        ctx.strokeRect(basket.x, basket.y, basket.width, basket.height);
    }

    // Dibujar la moneda
    function drawCoin() {
        ctx.beginPath();
        ctx.arc(coin.x, coin.y, coin.radius, 0, Math.PI * 2);
        ctx.fillStyle = coin.color;
        ctx.fill();
        ctx.closePath();

        // Brillo de la moneda
        ctx.beginPath();
        ctx.arc(coin.x - 4, coin.y - 4, coin.radius / 3, 0, Math.PI * 2);
        ctx.fillStyle = "rgba(255, 255, 255, 0.5)";
        ctx.fill();
        ctx.closePath();
    }

    // Dibujar el puntaje y tiempo
    function drawHUD() {
        ctx.fillStyle = "#000";
        ctx.font = "20px Arial";
        ctx.textAlign = "left";
        ctx.fillText("Puntos: " + score, 20, 30);
        ctx.fillText("Tiempo: " + timeLeft + "s", canvas.width - 120, 30);
    }

    // Actualizar posiciones
    function update() {
        if (!isPlaying) return;

        // Mover la moneda hacia abajo
        coin.y += coin.speed;

        // Comprobar si la moneda cae al suelo (pierdes oportunidad de atraparla)
        if (coin.y - coin.radius > canvas.height) {
            resetCoin();
        }

        // Comprobar colisión con la cesta (Atrapar moneda)
        if (coin.y + coin.radius > basket.y &&
            coin.x > basket.x &&
            coin.x < basket.x + basket.width &&
            coin.y < basket.y + basket.height) {
            
            score += 10;
            coin.speed += 0.2; // Aumenta la dificultad (caen más rápido)
            resetCoin();
        }
    }

    // Bucle principal del juego
    function drawGame() {
        ctx.clearRect(0, 0, canvas.width, canvas.height); // Limpiar pantalla
        drawHUD();
        drawBasket();
        drawCoin();
        update();
    }

    // Mover la cesta con el ratón
    canvas.addEventListener("mousemove", (e) => {
        if (!isPlaying) return;
        const rect = canvas.getBoundingClientRect();
        // Centrar la cesta donde apunta el ratón
        basket.x = e.clientX - rect.left - (basket.width / 2);

        // Evitar que la cesta se salga de la pantalla
        if (basket.x < 0) basket.x = 0;
        if (basket.x + basket.width > canvas.width) {
            basket.x = canvas.width - basket.width;
        }
    });

    // Mover la cesta con el dedo (Pantallas táctiles)
    canvas.addEventListener("touchmove", (e) => {
        if (!isPlaying) return;
        e.preventDefault(); // Evita que la pantalla se mueva
        const rect = canvas.getBoundingClientRect();
        basket.x = e.touches[0].clientX - rect.left - (basket.width / 2);
    });

    // Temporizador
    function startTimer() {
        timerInterval = setInterval(() => {
            if (timeLeft > 0) {
                timeLeft--;
            } else {
                endGame();
            }
        }, 1000);
    }

    // Fin del juego
    function endGame() {
        isPlaying = false;
        clearInterval(gameInterval);
        clearInterval(timerInterval);
        
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // Mensaje de fin
        ctx.fillStyle = "#000";
        ctx.font = "30px Arial";
        ctx.textAlign = "center";
        ctx.fillText("¡TIEMPO!" , canvas.width / 2, 200);
        ctx.fillText("Puntaje final: " + score, canvas.width / 2, 250);
        
        // Botón de reinicio
        ctx.font = "20px Arial";
        ctx.fillStyle = "#0055ff";
        ctx.fillText("Toca la pantalla para jugar de nuevo", canvas.width / 2, 350);
    }

    // Reiniciar juego al hacer clic
    canvas.addEventListener("click", () => {
        if (!isPlaying && timeLeft === 0) {
            score = 0;
            timeLeft = 30;
            coin.speed = 4;
            isPlaying = true;
            resetCoin();
            startTimer();
            gameInterval = setInterval(drawGame, 1000 / 60); // 60 FPS
        }
    });

    // Iniciar el juego por primera vez
    isPlaying = true;
    resetCoin();
    startTimer();
    gameInterval = setInterval(drawGame, 1000 / 60);

</script>

</body>
</html>
