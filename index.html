<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Atrapa la Moneda + Panel</title>

<style>
body{
  margin:0;
  background:#0f0f0f;
  color:white;
  font-family:Arial;
  text-align:center;
}
h1{color:#00ffcc;}
#moneda{font-size:80px;margin:20px;}
.info{font-size:20px;}

/* CHAT */
#chat{
  position:fixed;
  bottom:10px;
  right:10px;
  width:250px;
  background:#111;
  border:2px solid #00ffcc;
  border-radius:10px;
  padding:5px;
}
#messages{height:140px;overflow-y:auto;}
#chatInput{width:90%;padding:5px;}

/* PANEL */
#panelBtn{
  position:fixed;
  top:10px;
  right:10px;
  background:#00ffcc;
  border:none;
  padding:8px;
  border-radius:6px;
  cursor:pointer;
  display:none;
}

#panel{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:#111;
  border:2px solid #00ffcc;
  padding:20px;
  border-radius:10px;
  display:none;
}
button{margin:5px;padding:6px;}
</style>
</head>

<body>

<h1>🎮 ATRAPA LA MONEDA</h1>

<h2 id="moneda">?</h2>
<p>Presiona L, C o R</p>

<div class="info" id="stats"></div>

<!-- BOTÓN PANEL -->
<button id="panelBtn">Panel</button>

<!-- PANEL -->
<div id="panel">
  <h3>⚙ Panel</h3>
  <button onclick="addLives()">+5 vidas</button>
  <button onclick="resetGame()">Reset</button>
  <button onclick="closePanel()">Cerrar</button>
</div>

<!-- CHAT -->
<div id="chat">
  <div id="messages"></div>
  <input id="chatInput" placeholder="Escribe...">
</div>

<script>

// 🔒 LOGIN
if(localStorage.getItem("logged") !== "true"){
  location.href = "login.html";
}

let role = localStorage.getItem("role") || "player";
localStorage.removeItem("logged");

// ELEMENTOS
const moneda = document.getElementById("moneda");
const stats = document.getElementById("stats");
const input = document.getElementById("chatInput");
const messages = document.getElementById("messages");
const panelBtn = document.getElementById("panelBtn");
const panel = document.getElementById("panel");

// 👉 SOLO ADMIN / OWNER VEN PANEL
if(role === "owner" || role === "admin"){
  panelBtn.style.display = "block";
}

// JUEGO
let pesos=0, vidas=5, record=parseInt(localStorage.getItem("record"))||0;

if(role==="owner") vidas=999;
if(role==="admin") vidas=10;

let secuencia=["R","L","C","L","R","C","R"];
let i=0, actual="", vel=1500, loop;

function nueva(){
  actual=secuencia[i];
  moneda.textContent=actual;
  i=(i+1)%secuencia.length;
}

function update(){
  stats.innerHTML=`Pesos:${pesos} | Vidas:${vidas} | Rango:${role}`;
}

function over(){
  clearInterval(loop);
  alert("GAME OVER");
  start();
}

function tick(){
  vidas--;
  update();
  if(vidas<=0) return over();
  nueva();
}

function start(){
  pesos=0;
  vidas=(role==="owner"?999:(role==="admin"?10:5));
  vel=1500; i=0;
  update(); nueva();
  clearInterval(loop);
  loop=setInterval(tick,vel);
}

document.addEventListener("keydown",e=>{
  const k=e.key.toUpperCase();
  if(!["L","C","R"].includes(k)) return;

  if(k===actual){
    pesos++;
    vel=Math.max(500,vel-50);
    clearInterval(loop);
    loop=setInterval(tick,vel);
  }else{
    vidas--;
  }

  update();
  if(vidas<=0) return over();
  nueva();
});

start();

// ===== PANEL =====
panelBtn.onclick = ()=> panel.style.display="block";

function closePanel(){
  panel.style.display="none";
}

function addLives(){
  vidas += 5;
  update();
}

function resetGame(){
  start();
}

// ===== CHAT =====
input.addEventListener("keydown",e=>{
  if(e.key==="Enter"){
    if(!input.value.trim()) return;
    addMsg("[" + role + "] " + input.value);
    input.value="";
  }
});

function addMsg(t){
  const d=document.createElement("div");
  d.textContent=t;
  messages.appendChild(d);
  messages.scrollTop=messages.scrollHeight;
}

</script>

</body>
</html>
