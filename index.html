<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atrapa la Moneda</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #202020;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Courier New', Courier, monospace;
        }

        canvas {
            background: linear-gradient(to bottom, #87CEEB, #E0F6FF);
            border: 4px solid #fff;
            border-radius: 10px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            display: block;
            cursor: none;
        }

        canvas:active {
            cursor: grabbing;
        }

        /* ===== ESTILOS DEL MENÚ ADMIN ===== */
        .admin-button {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 50%;
            color: white;
            font-size: 24px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            transition: all 0.3s ease;
            z-index: 100;
        }

        .admin-button:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }

        .admin-button:active {
            transform: scale(0.95);
        }

        .admin-panel {
            position: fixed;
            bottom: 80px;
            right: 20px;
            width: 350px;
            background: #1a1a1a;
            border: 2px solid #667eea;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            display: none;
            z-index: 101;
            max-height: 500px;
            overflow-y: auto;
        }

        .admin-panel.active {
            display: block;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .admin-panel h2 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 18px;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }

        .config-group {
            margin-bottom: 15px;
            padding: 12px;
            background: #252525;
            border-radius: 8px;
            border-left: 3px solid #667eea;
        }

        .config-group label {
            display: block;
            color: #87CEEB;
            font-size: 12px;
            margin-bottom: 8px;
            font-weight: bold;
        }

        .config-group input[type="number"],
        .config-group input[type="text"] {
            width: 100%;
            padding: 8px;
            background: #1a1a1a;
            border: 1px solid #667eea;
            color: #fff;
            border-radius: 5px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 12px;
        }

        .config-group input[type="number"]:focus,
        .config-group input[type="text"]:focus {
            outline: none;
            border-color: #764ba2;
            box-shadow: 0 0 10px rgba(118, 75, 162, 0.5);
        }

        .config-value {
            color: #FFD700;
            font-size: 12px;
            margin-top: 5px;
            font-weight: bold;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .admin-btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 5px;
            color: white;
            cursor: pointer;
            font-size: 12px;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .admin-btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .admin-btn-primary:hover {
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.6);
            transform: translateY(-2px);
        }

        .admin-btn-secondary {
            background: #444;
        }

        .admin-btn-secondary:hover {
            background: #555;
        }

        .admin-btn-danger {
            background: #d32f2f;
        }

        .admin-btn-danger:hover {
            background: #b71c1c;
        }

        .admin-btn:active {
            transform: translateY(0);
        }

        .info-box {
            background: #0d47a1;
            color: #87CEEB;
            padding: 10px;
            border-radius: 5px;
            font-size: 11px;
            line-height: 1.4;
            margin-bottom: 10px;
        }

        .divider {
            height: 1px;
            background: #667eea;
            margin: 15px 0;
            opacity: 0.3;
        }

        /* Scroll bar personalizado */
        .admin-panel::-webkit-scrollbar {
            width: 6px;
        }

        .admin-panel::-webkit-scrollbar-track {
            background: #1a1a1a;
            border-radius: 10px;
        }

        .admin-panel::-webkit-scrollbar-thumb {
            background: #667eea;
            border-radius: 10px;
        }

        .admin-panel::-webkit-scrollbar-thumb:hover {
            background: #764ba2;
        }

        .admin-status {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 5px;
        }

        .admin-status.online {
            background: #4caf50;
            animation: blink 1.5s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
    </style>
</head>
<body>

<canvas id="gameCanvas" width="400" height="600"></canvas>

<!-- Botón Admin -->
<button class="admin-button" id="adminBtn" title="Panel de Admin (Solo para ti)">⚙️</button>

<!-- Panel Admin -->
<div class="admin-panel" id="adminPanel">
    <h2><span class="admin-status online"></span>Panel de Admin</h2>
    
    <div class="info-box">
        ℹ️ Acceso exclusivo para administrador. Modifica los parámetros del juego en tiempo real.
    </div>

    <!-- CONFIGURACIÓN DE TIEMPO -->
    <div class="config-group">
        <label>⏱️ Tiempo Inicial (segundos)</label>
        <input type="number" id="initialTime" min="5" max="120" value="30">
        <div class="config-value" id="initialTimeValue">Actual: 30s</div>
    </div>

    <!-- CONFIGURACIÓN DE VELOCIDAD -->
    <div class="config-group">
        <label>🎯 Velocidad Inicial de Moneda</label>
        <input type="number" id="initialSpeed" min="1" max="20" step="0.5" value="4">
        <div class="config-value" id="initialSpeedValue">Actual: 4 px/frame</div>
    </div>

    <!-- INCREMENTO DE VELOCIDAD -->
    <div class="config-group">
        <label>⚡ Incremento de Velocidad</label>
        <input type="number" id="speedIncrement" min="0.1" max="2" step="0.1" value="0.2">
        <div class="config-value" id="speedIncrementValue">Actual: 0.2 px/frame</div>
    </div>

    <!-- PUNTOS POR MONEDA -->
    <div class="config-group">
        <label>💰 Puntos por Moneda</label>
        <input type="number" id="scorePerCoin" min="1" max="100" value="10">
        <div class="config-value" id="scorePerCoinValue">Actual: 10 pts</div>
    </div>

    <!-- TAMAÑO DE CESTA -->
    <div class="config-group">
        <label>🧺 Ancho de Cesta (píxeles)</label>
        <input type="number" id="basketWidth" min="40" max="150" value="80">
        <div class="config-value" id="basketWidthValue">Actual: 80 px</div>
    </div>

    <!-- TAMAÑO DE MONEDA -->
    <div class="config-group">
        <label>🪙 Radio de Moneda (píxeles)</label>
        <input type="number" id="coinRadius" min="5" max="30" value="15">
        <div class="config-value" id="coinRadiusValue">Actual: 15 px</div>
    </div>

    <!-- CONTRASEÑA ADMIN -->
    <div class="config-group">
        <label>🔐 Contraseña Admin</label>
        <input type="text" id="adminPassword" placeholder="admin123" value="admin123">
        <div class="config-value">Para activar panel en otras sesiones</div>
    </div>

    <div class="divider"></div>

    <!-- INFORMACIÓN DE ESTADO -->
    <div class="config-group">
        <label>📊 Estado del Juego</label>
        <div class="config-value" id="gameStatus">Estado: Inactivo</div>
        <div class="config-value" id="gameScore">Puntos: 0</div>
        <div class="config-value" id="gameTime">Tiempo: 0s</div>
    </div>

    <div class="divider"></div>

    <!-- BOTONES DE ACCIÓN -->
    <div class="button-group">
        <button class="admin-btn admin-btn-primary" id="applyBtn">✅ Aplicar</button>
        <button class="admin-btn admin-btn-secondary" id="resetBtn">↺ Resetear</button>
    </div>

    <div class="button-group">
        <button class="admin-btn admin-btn-danger" id="clearBtn">🗑️ Limpiar Todo</button>
    </div>
</div>

<script>
    // ===== CONFIGURACIÓN DEL JUEGO =====
    const CONFIG = {
        INITIAL_TIME: 30,
        INITIAL_COIN_SPEED: 4,
        SPEED_INCREMENT: 0.2,
        SCORE_PER_COIN: 10,
        FPS: 60,
        BASKET_WIDTH: 80,
        BASKET_HEIGHT: 20,
        COIN_RADIUS: 15
    };

    // ===== ESTADO DEL JUEGO =====
    const gameState = {
        score: 0,
        timeLeft: CONFIG.INITIAL_TIME,
        isPlaying: false,
        gameInterval: null,
        timerInterval: null,
        adminPassword: "admin123"
    };

    // ===== ELEMENTOS DEL JUEGO =====
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");

    const basket = {
        x: canvas.width / 2 - CONFIG.BASKET_WIDTH / 2,
        y: canvas.height - 60,
        width: CONFIG.BASKET_WIDTH,
        height: CONFIG.BASKET_HEIGHT,
        color: "#8B4513"
    };

    const coin = {
        x: 0,
        y: -CONFIG.COIN_RADIUS * 2,
        radius: CONFIG.COIN_RADIUS,
        speed: CONFIG.INITIAL_COIN_SPEED,
        color: "#FFD700"
    };

    // ===== SISTEMA DE ADMIN =====

    const adminButton = document.getElementById("adminBtn");
    const adminPanel = document.getElementById("adminPanel");
    const applyBtn = document.getElementById("applyBtn");
    const resetBtn = document.getElementById("resetBtn");
    const clearBtn = document.getElementById("clearBtn");

    // Event listeners del panel admin
    adminButton.addEventListener("click", () => {
        adminPanel.classList.toggle("active");
    });

    // Actualizar valores mostrados en tiempo real
    document.getElementById("initialTime").addEventListener("input", (e) => {
        document.getElementById("initialTimeValue").textContent = `Actual: ${e.target.value}s`;
    });

    document.getElementById("initialSpeed").addEventListener("input", (e) => {
        document.getElementById("initialSpeedValue").textContent = `Actual: ${e.target.value} px/frame`;
    });

    document.getElementById("speedIncrement").addEventListener("input", (e) => {
        document.getElementById("speedIncrementValue").textContent = `Actual: ${e.target.value} px/frame`;
    });

    document.getElementById("scorePerCoin").addEventListener("input", (e) => {
        document.getElementById("scorePerCoinValue").textContent = `Actual: ${e.target.value} pts`;
    });

    document.getElementById("basketWidth").addEventListener("input", (e) => {
        document.getElementById("basketWidthValue").textContent = `Actual: ${e.target.value} px`;
    });

    document.getElementById("coinRadius").addEventListener("input", (e) => {
        document.getElementById("coinRadiusValue").textContent = `Actual: ${e.target.value} px`;
    });

    // Aplicar configuración
    applyBtn.addEventListener("click", () => {
        CONFIG.INITIAL_TIME = parseInt(document.getElementById("initialTime").value);
        CONFIG.INITIAL_COIN_SPEED = parseFloat(document.getElementById("initialSpeed").value);
        CONFIG.SPEED_INCREMENT = parseFloat(document.getElementById("speedIncrement").value);
        CONFIG.SCORE_PER_COIN = parseInt(document.getElementById("scorePerCoin").value);
        CONFIG.BASKET_WIDTH = parseInt(document.getElementById("basketWidth").value);
        CONFIG.COIN_RADIUS = parseInt(document.getElementById("coinRadius").value);
        gameState.adminPassword = document.getElementById("adminPassword").value;

        // Actualizar cesta y moneda con nuevas dimensiones
        basket.width = CONFIG.BASKET_WIDTH;
        basket.x = canvas.width / 2 - CONFIG.BASKET_WIDTH / 2;
        coin.radius = CONFIG.COIN_RADIUS;

        // Mostrar confirmación
        const originalText = applyBtn.textContent;
        applyBtn.textContent = "✅ ¡Guardado!";
        setTimeout(() => {
            applyBtn.textContent = originalText;
        }, 2000);
    });

    // Resetear a valores por defecto
    resetBtn.addEventListener("click", () => {
        document.getElementById("initialTime").value = "30";
        document.getElementById("initialSpeed").value = "4";
        document.getElementById("speedIncrement").value = "0.2";
        document.getElementById("scorePerCoin").value = "10";
        document.getElementById("basketWidth").value = "80";
        document.getElementById("coinRadius").value = "15";

        // Actualizar labels
        document.getElementById("initialTimeValue").textContent = "Actual: 30s";
        document.getElementById("initialSpeedValue").textContent = "Actual: 4 px/frame";
        document.getElementById("speedIncrementValue").textContent = "Actual: 0.2 px/frame";
        document.getElementById("scorePerCoinValue").textContent = "Actual: 10 pts";
        document.getElementById("basketWidthValue").textContent = "Actual: 80 px";
        document.getElementById("coinRadiusValue").textContent = "Actual: 15 px";
    });

    // Limpiar todo (resetear juego y configuración)
    clearBtn.addEventListener("click", () => {
        if (confirm("⚠️ ¿Deseas resetear TODO el juego? Se perderán los datos actuales.")) {
            resetBtn.click(); // Resetear configuración
            resetGameState();
            resetCoin();
            gameState.isPlaying = false;
            clearInterval(gameState.gameInterval);
            clearInterval(gameState.timerInterval);

            const originalText = clearBtn.textContent;
            clearBtn.textContent = "✅ ¡Limpiado!";
            setTimeout(() => {
                clearBtn.textContent = originalText;
            }, 2000);
        }
    });

    // Actualizar estado del juego cada 100ms
    setInterval(() => {
        document.getElementById("gameStatus").textContent = `Estado: ${gameState.isPlaying ? "🔴 En juego" : "🟢 Parado"}`;
        document.getElementById("gameScore").textContent = `Puntos: ${gameState.score}`;
        document.getElementById("gameTime").textContent = `Tiempo: ${gameState.timeLeft}s`;
    }, 100);

    // ===== FUNCIONES AUXILIARES =====
    
    /**
     * Reinicia la moneda en una posición aleatoria en la parte superior
     */
    function resetCoin() {
        coin.y = -CONFIG.COIN_RADIUS * 2;
        coin.x = Math.random() * (canvas.width - coin.radius * 2) + coin.radius;
    }

    /**
     * Reinicia el estado del juego
     */
    function resetGameState() {
        gameState.score = 0;
        gameState.timeLeft = CONFIG.INITIAL_TIME;
        coin.speed = CONFIG.INITIAL_COIN_SPEED;
    }

    // ===== FUNCIONES DE DIBUJO =====

    /**
     * Dibuja la cesta del jugador
     */
    function drawBasket() {
        ctx.fillStyle = basket.color;
        ctx.fillRect(basket.x, basket.y, basket.width, basket.height);
        
        // Detalles de la cesta
        ctx.strokeStyle = "#5c2d0c";
        ctx.lineWidth = 3;
        ctx.strokeRect(basket.x, basket.y, basket.width, basket.height);
    }

    /**
     * Dibuja la moneda con efecto de brillo
     */
    function drawCoin() {
        // Cuerpo principal
        ctx.beginPath();
        ctx.arc(coin.x, coin.y, coin.radius, 0, Math.PI * 2);
        ctx.fillStyle = coin.color;
        ctx.fill();
        ctx.closePath();

        // Efecto de brillo
        ctx.beginPath();
        ctx.arc(coin.x - 4, coin.y - 4, coin.radius / 3, 0, Math.PI * 2);
        ctx.fillStyle = "rgba(255, 255, 255, 0.5)";
        ctx.fill();
        ctx.closePath();
    }

    /**
     * Dibuja el HUD (puntuación y tiempo)
     */
    function drawHUD() {
        ctx.fillStyle = "#000";
        ctx.font = "bold 20px Arial";
        ctx.textAlign = "left";
        ctx.fillText(`Puntos: ${gameState.score}`, 20, 30);
        
        ctx.textAlign = "right";
        ctx.fillText(`Tiempo: ${gameState.timeLeft}s`, canvas.width - 20, 30);
    }

    /**
     * Dibuja la pantalla de fin de juego
     */
    function drawGameOver() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // Fondo semi-transparente
        ctx.fillStyle = "rgba(0, 0, 0, 0.7)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Textos
        ctx.fillStyle = "#FFF";
        ctx.font = "bold 40px Arial";
        ctx.textAlign = "center";
        ctx.fillText("¡TIEMPO!", canvas.width / 2, 150);

        ctx.font = "bold 32px Arial";
        ctx.fillStyle = "#FFD700";
        ctx.fillText(`Puntuación: ${gameState.score}`, canvas.width / 2, 220);

        ctx.font = "18px Arial";
        ctx.fillStyle = "#87CEEB";
        ctx.fillText("Haz clic para jugar de nuevo", canvas.width / 2, 320);
    }

    // ===== FUNCIONES DE FÍSICA =====

    /**
     * Verifica si hay colisión entre la moneda y la cesta
     */
    function checkCollision() {
        const coinBottom = coin.y + coin.radius;
        const coinTop = coin.y - coin.radius;
        const basketTop = basket.y;
        const basketBottom = basket.y + basket.height;

        return (
            coinBottom > basketTop &&
            coinTop < basketBottom &&
            coin.x > basket.x &&
            coin.x < basket.x + basket.width
        );
    }

    /**
     * Actualiza la posición de la moneda y verifica colisiones
     */
    function update() {
        if (!gameState.isPlaying) return;

        // Mover la moneda hacia abajo
        coin.y += coin.speed;

        // Si la moneda cae fuera de pantalla
        if (coin.y - coin.radius > canvas.height) {
            resetCoin();
        }

        // Verificar colisión con la cesta
        if (checkCollision()) {
            gameState.score += CONFIG.SCORE_PER_COIN;
            coin.speed += CONFIG.SPEED_INCREMENT;
            resetCoin();
        }
    }

    /**
     * Bucle principal del juego
     */
    function gameLoop() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        drawHUD();
        drawBasket();
        drawCoin();
        update();
    }

    // ===== FUNCIONES DE ENTRADA =====

    /**
     * Actualiza la posición de la cesta según el movimiento del ratón
     */
    function handleMouseMove(e) {
        if (!gameState.isPlaying) return;
        
        const rect = canvas.getBoundingClientRect();
        const mouseX = e.clientX - rect.left;

        // Centrar la cesta en la posición del ratón
        basket.x = mouseX - basket.width / 2;

        // Limitar movimiento dentro del canvas
        basket.x = Math.max(0, Math.min(basket.x, canvas.width - basket.width));
    }

    /**
     * Actualiza la posición de la cesta según el toque en pantalla táctil
     */
    function handleTouchMove(e) {
        if (!gameState.isPlaying) return;
        
        e.preventDefault();
        const rect = canvas.getBoundingClientRect();
        const touchX = e.touches[0].clientX - rect.left;

        basket.x = touchX - basket.width / 2;
        basket.x = Math.max(0, Math.min(basket.x, canvas.width - basket.width));
    }

    // ===== FUNCIONES DE CONTROL DE JUEGO =====

    /**
     * Inicia el temporizador del juego
     */
    function startTimer() {
        gameState.timerInterval = setInterval(() => {
            if (gameState.timeLeft > 0) {
                gameState.timeLeft--;
            } else {
                endGame();
            }
        }, 1000);
    }

    /**
     * Finaliza el juego
     */
    function endGame() {
        gameState.isPlaying = false;
        clearInterval(gameState.gameInterval);
        clearInterval(gameState.timerInterval);
        drawGameOver();
    }

    /**
     * Inicia una nueva partida
     */
    function startGame() {
        resetGameState();
        resetCoin();
        gameState.isPlaying = true;
        gameLoop(); // Dibujar una vez antes de iniciar el loop
        startTimer();
        gameState.gameInterval = setInterval(gameLoop, 1000 / CONFIG.FPS);
    }

    // ===== EVENT LISTENERS =====
    canvas.addEventListener("mousemove", handleMouseMove);
    canvas.addEventListener("touchmove", handleTouchMove, { passive: false });
    canvas.addEventListener("click", () => {
        if (!gameState.isPlaying && gameState.timeLeft === 0) {
            startGame();
        }
    });

    // ===== INICIAR JUEGO =====
    startGame();

</script>

</body>
</html>
